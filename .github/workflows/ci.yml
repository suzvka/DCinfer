name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y ninja-build

      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Bootstrap vcpkg
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            ./external/vcpkg/bootstrap-vcpkg.bat
          else
            chmod +x ./external/vcpkg/bootstrap-vcpkg.sh
            ./external/vcpkg/bootstrap-vcpkg.sh
          fi
        shell: bash

      - name: Configure (CMake)
        run: cmake --preset ${{ runner.os == 'Linux' && 'linux' || runner.os == 'macOS' && 'macos' || 'windows' }}-debug

      - name: Build
        run: cmake --build --preset ${{ runner.os == 'Linux' && 'linux' || runner.os == 'macOS' && 'macos' || 'windows' }}-debug

      - name: Test
        run: ctest --preset ${{ runner.os == 'Linux' && 'linux' || runner.os == 'macOS' && 'macos' || 'windows' }}-debug
